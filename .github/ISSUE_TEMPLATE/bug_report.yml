name: Bug report
description: Report a reproducible problem in Zenie Code
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands and visible output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Zenie version
      placeholder: "zenie --version"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Model provider and model
